name: PEREGRINE CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout PEREGRINE
      uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install fastapi uvicorn python-multipart pillow numpy tqdm scikit-learn mlflow matplotlib

    - name: Test CapsNet model initializes
      run: |
        cd src
        python -c "
        import sys
        sys.path.append('.')
        from models.capsnet import CapsNet
        import torch
        model = CapsNet(num_classes=20, in_channels=3, img_size=64)
        x = torch.randn(2, 3, 64, 64)
        out = model(x)
        assert out.shape == (2, 20), f'Expected (2,20) got {out.shape}'
        print('CapsNet test passed')
        "

    - name: Test ResNet baseline initializes
      run: |
        cd src
        python -c "
        import sys
        sys.path.append('.')
        from models.resnet_baseline import ResNetBaseline
        import torch
        model = ResNetBaseline(num_classes=20, in_channels=3)
        x = torch.randn(2, 3, 64, 64)
        out = model(x)
        assert out.shape == (2, 20), f'Expected (2,20) got {out.shape}'
        print('ResNet test passed')
        "

    - name: Test MNIST mode backward compatibility
      run: |
        cd src
        python -c "
        import sys
        sys.path.append('.')
        from models.capsnet import CapsNet
        import torch
        model = CapsNet(num_classes=10, in_channels=1, img_size=28)
        x = torch.randn(2, 1, 28, 28)
        out = model(x)
        assert out.shape == (2, 10), f'Expected (2,10) got {out.shape}'
        print('MNIST mode test passed')
        "

    - name: Test API imports
      run: |
        cd src
        python -c "
        import sys
        sys.path.append('.')
        from models.capsnet import CapsNet
        from fastapi.testclient import TestClient
        print('API imports passed')
        "

    - name: All tests passed
      run: echo "PEREGRINE CI passed — all systems operational"
